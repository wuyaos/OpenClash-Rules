mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
external-controller: :9090
unified-delay: true
tcp-concurrent: true
global-client-fingerprint: chrome

dns:
  enable: true # 开启 DNS 配置
  enhanced-mode: fake-ip # 使用 fake-ip 提升规则匹配效率
  fake-ip-range: 198.18.0.1/16 # fake-ip 网段
  use-hosts: true # 读取 hosts
  use-system-hosts: true # 读取系统 hosts
  ipv6: true # IPv6 解析开关
  default-nameserver: # 基础 DNS，必须为 IP 形式（此处使用阿里 DNS over TLS）
    - tls://223.5.5.5
    - tls://223.6.6.6
  nameserver: # 未命中分流规则最终走 MATCH 时使用，采用国外 DNS 防污染/泄漏
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  proxy-server-nameserver: # 解析代理节点域名时使用，优先国内 DNS 保证起步可达
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver: # 命中直连规则时使用国内 DNS
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  respect-rules: true # 连接 DNS 服务器时遵循路由规则
  fake-ip-filter-mode: blacklist # 显式启用 fake-ip-filter 模式（黑名单语义）
  fake-ip-filter: # 最小 fake-ip 例外集合，保障内网/授时等直连场景
    - '*.lan'
    - '*.local'
    - '*.localhost'
    - '*.home.arpa'
    - geosite:private
    - geosite:category-ntp

proxies:
  - name: home-8ga9ngi3
    type: vless
    server: 192.168.123.xx
    port: xxx
    uuid: xxx
    network: tcp
    tls: true
    skip-cert-verify: false
    servername: www.intel.com
    client-fingerprint: xx

proxy-groups:
  - name: 🏠 回家
    type: select
    proxies:
      - home-8ga9ngi3
      - DIRECT

rules:
  - IP-CIDR,192.168.123.0/24,🏠 回家,no-resolve
  - GEOIP,LAN,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,DIRECT
