mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
external-controller: :9090
unified-delay: true  # 更换延迟计算方式，去除握手等额外延迟
tcp-concurrent: true # 启用 TCP 并发连接。这允许 Clash 同时建立多个 TCP
global-client-fingerprint: chrome # 设置全局客户端指纹为 Chrome，使 Clash 在建立连接时模拟 Chrome 浏览器的 TLS 指纹，增强隐私性和绕过某些网站的指纹检测

dns:
  enable: true # 开启 DNS 配置
  enhanced-mode: fake-ip # 使用 fake-ip 提升规则匹配效率
  fake-ip-range: 198.18.0.1/16 # fake-ip 网段
  use-hosts: true # 读取 hosts
  use-system-hosts: true # 读取系统 hosts
  ipv6: true # IPv6 解析开关
  respect-rules: true      #让连接DNS服务器时能够遵循规则，也就是通过代理节点连接到上面设置的国外DNS，因为直连可能连接不上
  default-nameserver: # 基础 DNS，必须为 IP 形式
    - tls://223.5.5.5
    - tls://223.6.6.6
    - tls://119.29.29.29
    - tls://1.12.12.12
  nameserver: # 未命中分流规则最终走 MATCH 时使用，采用国外 DNS 防污染/泄漏
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
    - https://dns.quad9.net/dns-query
    - https://dns.opendns.com/dns-query
  proxy-server-nameserver: # 解析代理节点域名时使用，优先国内 DNS 保证起步可达
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    - https://doh.360.cn/dns-query
  direct-nameserver: # 命中直连规则时使用国内 DNS
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    - https://doh.360.cn/dns-query
  fake-ip-filter-mode: blacklist # 显式启用 fake-ip-filter 模式（黑名单语义）
  fake-ip-filter:
    - '*.lan'
    - '*.localhost'
    - '*.test'
    - '*.local'
    - '*.home.arpa'
    - geosite:private
    - geosite:category-ntp
    - 'stun.*.*'
    - 'stun.*.*.*'
    - 'WORKGROUP'
