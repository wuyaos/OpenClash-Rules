profile:
  store-selected: true
  store-fake-ip: true
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports:
        - 80
        - "8080-8880"
    TLS:
      ports:
        - 443
        - 5228
        - 8443
    QUIC:
      ports:
        - 443
        - 8443
  force-domain:
    - "+.v2ex.com"
  skip-domain:
    - "Mijia Cloud"
tun:
  enable: true
  device: "Meta"
  stack: "gvisor"
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  udp-timeout: 300
  auto-route: true
  strict-route: true
  auto-redirect: false
  auto-detect-interface: true
  exclude-package: []
dns:
  enable: true
  ipv6: true
  enhanced-mode: "fake-ip"
  fake-ip-range: "198.18.0.1/16"
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  default-nameserver:
    - "tls://223.5.5.5"
    - "tls://223.6.6.6"
    - "tls://119.29.29.29"
    - "tls://1.12.12.12"
  nameserver:
    - "https://cloudflare-dns.com/dns-query"
    - "https://dns.google/dns-query"
    - "https://dns.quad9.net/dns-query"
    - "https://dns.opendns.com/dns-query"
  proxy-server-nameserver:
    - "https://dns.alidns.com/dns-query"
    - "https://doh.pub/dns-query"
    - "https://doh.360.cn/dns-query"
  direct-nameserver:
    - "https://dns.alidns.com/dns-query"
    - "https://doh.pub/dns-query"
    - "https://doh.360.cn/dns-query"
  fake-ip-filter-mode: "blacklist"
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "*.home.arpa"
    - "geosite:private"
    - "geosite:category-ntp"
proxies:
  -
    name: "DNS_Hijack"
    type: "dns"
  -
    name: "home1"
    type: "ss"
    server: "127.0.0.1"
    port: 8388
    cipher: "aes-128-gcm"
    password: "please-change-me"
    udp: true
  -
    name: "🇨🇳 本地直连"
    type: "direct"
    udp: true
  -
    name: "⛔ 拒绝连接"
    type: "reject"
