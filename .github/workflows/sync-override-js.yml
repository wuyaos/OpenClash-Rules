name: Sync Override JS

on:
  push:
    paths:
      - "config/**/*.ini"
      - "scripts/gen_script.js"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-override-js:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate override scripts from ini
        run: node scripts/gen_script.js

      - name: Commit and push override updates
        run: |
          if git diff --quiet -- scripts/override_*.js; then
            echo "No override JS changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/override_*.js
          git commit -m "chore(override): regenerate scripts from ini [skip ci]"
          git push
