name: Sync Direct Android Ruleset

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync app/game mutated rules + adblock-reject
        run: node scripts/sync-direct-android-ruleset.js

      - name: Commit changes
        run: |
          if git diff --quiet -- rules/app-mutated.list rules/game-mutated.list rules/adblock-reject.list; then
            echo "No changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rules/app-mutated.list rules/game-mutated.list rules/adblock-reject.list
          git commit -m "chore(rules): sync direct-android + adblock-reject lists"
          git push
